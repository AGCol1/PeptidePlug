<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product - Peptide Plug</title>
  <link rel="icon" type="image/png" href="../assets/images/pepbanner.png">
  <link rel="stylesheet" href="/style.css">
</head>

<body>

  <section class="banner-wrap">
    <img src="/assets/images/pepbanner.png" alt="Peptide Plug Banner" class="top-banner" id="topBanner">
  </section>

  <section class="category-nav-wrap">
    <nav class="category-nav" id="categoryNav"></nav>
  </section>

  <div class="back-link">
    <a href="/shop/" class="btn secondary">Back to Shop</a>
  </div>

  <section class="product-page" id="productPage"></section>

  <footer>
    <p>© 2026 Peptide Plug</p>
  </footer>

  <script src="/js/site-config.js"></script>
  <script src="/js/products.js"></script>
  <script src="/js/basket.js"></script>
  <script src="/js/components.js"></script>
  <script src="/js/product.js"></script>
  <script src="/script.js"></script>

  <div id="supportWidget">
    <button id="supportToggle" aria-label="Open support form">Get Support</button>

    <div id="supportPanel">
      <button id="supportClose" aria-label="Close support form">&times;</button>

      <form id="supportForm">
        <h3>Need help?</h3>

        <input type="text" name="name" placeholder="Your name" required>
        <input type="email" name="email" placeholder="Your email" required>
        <textarea name="message" placeholder="What would you like help with?" required></textarea>

        <button type="submit">Send</button>
        <p id="supportStatus"></p>
      </form>
    </div>
  </div>
  <div id="siteFooter"></div>
</body>

</html>
